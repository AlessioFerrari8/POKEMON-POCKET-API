<section class="min-h-screen bg-gradient-to-b from-slate-900 via-slate-800 to-slate-900 px-4 py-10 text-slate-100">
	<div class="mx-auto w-full max-w-2xl rounded-2xl border border-slate-700 bg-slate-800/70 p-6 shadow-2xl backdrop-blur-sm md:p-8">
		<header class="mb-8">
			<h1 class="text-2xl font-bold tracking-tight md:text-3xl">Account Settings</h1>
				<p class="mt-2 text-sm text-slate-300 md:text-base">Manage your account's nickname.</p>
		</header>

		@if (successMessage()) {
			<div class="mb-4 rounded-lg border border-emerald-500/40 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200">
				{{ successMessage() }}
			</div>
		}

		@if (errorMessage()) {
			<div class="mb-4 rounded-lg border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">
				{{ errorMessage() }}
			</div>
		}

		<div class="space-y-7">
			<section class="rounded-xl border border-slate-700 bg-slate-900/40 p-5">
				<label for="nickname" class="block text-sm font-semibold text-slate-100">Nickname</label>
				<p class="mt-1 text-xs text-slate-400">At least 2 chars, max 24.</p>

				<div class="mt-4 flex flex-col gap-3 sm:flex-row">
					<input
						id="nickname"
						name="nickname"
						type="text"
						[(ngModel)]="nickname"
						maxlength="24"
						class="w-full rounded-lg border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none"
					>

					<button
						type="button"
						(click)="saveNickname()"
						[disabled]="isSavingNickname()"
						class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-semibold text-slate-900 transition hover:bg-cyan-400 disabled:cursor-not-allowed disabled:opacity-60"
					>
						{{ isSavingNickname() ? 'Saving...' : 'Save Nickname' }}
					</button>
				</div>
			</section>
		</div>
	</div>
</section>
